<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Shield 中級エキスパートドリル</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React (システム用) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (ブラウザでReactを動かすため) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0f071a]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- アイコンコンポーネント（外部依存をなくすためにSVGを直接埋め込み） ---
        const Shield = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path></svg>
        );
        const ChevronRight = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"></path></svg>
        );
        const CheckCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>
        );
        const XCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
        );
        const AlertCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>
        );
        const RefreshCcw = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 21v-5h5"></path></svg>
        );
        const Trophy = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
        );
        const Target = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
        );
        const TrendingUp = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
        );

        // --- メインアプリ ---
        const App = () => {
            const [currentStep, setCurrentStep] = useState('start');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showExplanation, setShowExplanation] = useState(false);
            const [selectedOption, setSelectedOption] = useState(null);

            const questions = [
                {
                    title: "ダウ理論：ダマシの回避",
                    htf: { d1: "上昇", h4: "上昇" },
                    question: "上位足が共に上昇トレンドの中、1時間足で一時的に直近安値をヒゲで下抜けたが、実体で戻した。この時の判断は？",
                    svg: (
                        <svg viewBox="0 0 200 120" className="w-full h-40 bg-slate-950 rounded-xl p-4">
                            <path d="M20 100 L50 60 L80 80 L110 30 L130 95 L130 50 L160 20" fill="none" stroke="#A855F7" strokeWidth="2" />
                            <line x1="120" y1="80" x2="140" y2="80" stroke="#F43F5E" strokeWidth="1" strokeDasharray="2" />
                            <circle cx="130" cy="95" r="2" fill="#F43F5E" />
                            <text x="145" y="90" fill="#F43F5E" fontSize="8">ヒゲでの下抜け</text>
                        </svg>
                    ),
                    options: [
                        "トレンド転換確定なので即座に売り",
                        "安値更新失敗（ダマシ）と判断し、押し目買いを検討",
                        "トレンドレスとして1週間静観",
                        "両建てしてリスクを分散する"
                    ],
                    correct: 1,
                    explanation: "上位足が上昇中である以上、実体で安値を守っている下抜けは「ストップ狩り（流動性確保）」の可能性が極めて高いです。FX Shieldでは強気の押し目買いを検討します。"
                },
                {
                    title: "水平線：サポレジの強弱",
                    htf: { d1: "下降（抵抗線付近）", h4: "上昇" },
                    question: "日足の強力な抵抗線に1時間足が接近。4時間足は上昇しているが、最も警戒すべきは？",
                    svg: (
                        <svg viewBox="0 0 200 120" className="w-full h-40 bg-slate-950 rounded-xl p-4">
                            <line x1="0" y1="40" x2="200" y2="40" stroke="#A855F7" strokeWidth="3" />
                            <path d="M20 100 L35 40 L50 90 L65 40 L80 100 L95 40" fill="none" stroke="#64748b" strokeWidth="1" />
                            <rect x="110" y="50" width="8" height="40" fill="#22c55e" />
                            <rect x="125" y="42" width="8" height="20" fill="#22c55e" />
                        </svg>
                    ),
                    options: [
                        "4時間足が上昇なので、必ずブレイクすると判断する",
                        "最強の上位足である日足の抵抗を重視し、反発を警戒する",
                        "1時間足の勢いだけを見て飛び乗り買いをする",
                        "特に何も考えず現在の価格で買う"
                    ],
                    correct: 1,
                    explanation: "FX Shieldにおいて、日足の水平線は「絶対的な壁」です。下位足の勢いが良くても、日足レベルの抵抗帯では一度反発する可能性が非常に高く、安易なロングは危険です。"
                },
                {
                    title: "マルチタイムフレーム：深い調整",
                    htf: { d1: "強い上昇", h4: "上昇トレンド中" },
                    question: "日足・4時間足が上昇中、1時間足だけが急落して200MAを大きく下抜けた。この相場をどう見る？",
                    svg: (
                        <svg viewBox="0 0 200 120" className="w-full h-40 bg-slate-950 rounded-xl p-4">
                            <path d="M10 100 Q 100 80, 190 60" fill="none" stroke="#3b82f6" strokeWidth="2" opacity="0.5" />
                            <path d="M110 50 L130 70 L150 90 L170 80" fill="none" stroke="#A855F7" strokeWidth="2" />
                            <text x="10" y="20" fill="white" fontSize="8">青:日足MA / 紫:1時間足価格</text>
                        </svg>
                    ),
                    options: [
                        "下降トレンドに転換したので売りで攻める",
                        "上位足の上昇トレンドにおける「絶好の押し目候補」と見る",
                        "相場が崩壊したので、数ヶ月間トレードを休む",
                        "インジケーターの故障を疑う"
                    ],
                    correct: 1,
                    explanation: "日足と4時間足が上を向いている限り、1時間足の下落は「一時的な戻し」に過ぎません。200MAを下抜けたことで逆に割安感が出たと判断し、反転を待ちます。"
                },
                {
                    title: "移動平均線：大衆心理の境界",
                    htf: { d1: "横ばい（レンジ）", h4: "下降トレンド中" },
                    question: "1時間足で、数日間意識されていた200MAを力強い大陽線で突破した。この持つ意味は？",
                    svg: (
                        <svg viewBox="0 0 200 120" className="w-full h-40 bg-slate-950 rounded-xl p-4">
                            <path d="M10 50 Q 100 50, 190 50" stroke="#3b82f6" strokeWidth="2" fill="none" />
                            <path d="M20 80 L60 70 L100 85 L140 30" stroke="#A855F7" strokeWidth="2" fill="none" />
                        </svg>
                    ),
                    options: [
                        "ただのダマシなので無視する",
                        "長期的な優位性が買いに傾いた可能性が高いと見る",
                        "MAにぶつかったので即座に逆張りで売る",
                        "特に意味はないのでニュースをチェックする"
                    ],
                    correct: 1,
                    explanation: "200MAは「買いと売りの勢力図」を分ける世界基準の線です。ここを力強く抜けることは、相場の支配権が移ったことを示唆します。"
                },
                {
                    title: "水平線：究極の重なり",
                    htf: { d1: "下降トレンド（戻り高値付近）", h4: "下降トレンド" },
                    question: "日足の水平線、チャネル上限、1時間足MAの3つが同じ価格で重なった。この局面をどう捉える？",
                    svg: (
                        <svg viewBox="0 0 200 120" className="w-full h-40 bg-slate-950 rounded-xl p-4">
                            <line x1="20" y1="80" x2="180" y2="30" stroke="#64748b" strokeWidth="1" />
                            <line x1="20" y1="50" x2="180" y2="0" stroke="#64748b" strokeWidth="1" />
                            <line x1="0" y1="20" x2="200" y2="20" stroke="#f43f5e" strokeWidth="2" />
                            <circle cx="150" cy="10" r="15" fill="none" stroke="#fbbf24" strokeWidth="2" strokeDasharray="2" />
                        </svg>
                    ),
                    options: [
                        "根拠の重なり（コンフルエンス）であり、非常に勝率が高い売りの場面",
                        "根拠が多すぎてどれを信じて良いか分からないので逃げる",
                        "MAの期間を25に変更して再度検討する",
                        "買いの絶好のチャンスと判断する"
                    ],
                    correct: 0,
                    explanation: "FX Shieldにおいて複数の根拠が重なるポイントは「戦術の聖域」です。独立した複数のフィルターが同じ方向を指しているため、確信を持ってエントリーできます。"
                }
            ];

            const handleStart = () => {
                setCurrentStep('quiz');
                setCurrentQuestion(0);
                setScore(0);
                setShowExplanation(false);
                setSelectedOption(null);
            };

            const handleAnswer = (index) => {
                if (showExplanation) return;
                setSelectedOption(index);
                if (index === questions[currentQuestion].correct) {
                    setScore(score + 1);
                }
                setShowExplanation(true);
            };

            const nextQuestion = () => {
                if (currentQuestion + 1 < questions.length) {
                    setCurrentQuestion(currentQuestion + 1);
                    setShowExplanation(false);
                    setSelectedOption(null);
                } else {
                    setCurrentStep('result');
                }
            };

            const currentProgress = ((currentQuestion + 1) / questions.length) * 100;

            return (
                <div className="min-h-screen bg-[#0f071a] flex flex-col items-center justify-center p-4 font-sans text-slate-100">
                    <div className="w-full max-w-2xl bg-[#1a0b2e] rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden border border-purple-500/30">
                        
                        {currentStep === 'quiz' && (
                            <div className="h-2 w-full bg-purple-950">
                                <div 
                                    className="h-full bg-gradient-to-r from-purple-600 to-fuchsia-500 transition-all duration-700 ease-in-out"
                                    style={{ width: `${currentProgress}%` }}
                                />
                            </div>
                        )}

                        <div className="p-8 md:p-12">
                            {currentStep === 'start' && (
                                <div className="text-center py-10">
                                    <div className="relative w-36 h-36 mx-auto mb-10">
                                        <div className="absolute inset-0 bg-purple-600/20 rounded-full animate-pulse blur-xl"></div>
                                        <div className="relative flex items-center justify-center w-full h-full bg-gradient-to-br from-purple-600 to-indigo-700 rounded-full border-4 border-purple-400/50 shadow-[0_0_30px_rgba(168,85,247,0.4)]">
                                            <Shield className="w-20 h-20 text-white" />
                                        </div>
                                    </div>
                                    <h1 className="text-5xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-fuchsia-300 to-purple-400 tracking-tight">
                                        FX Shield
                                    </h1>
                                    <p className="text-2xl font-bold mb-6 text-purple-300 border-y border-purple-500/30 py-2 inline-block">【中級】エキスパート・ドリル</p>
                                    <p className="text-purple-200/60 mb-12 text-lg leading-relaxed max-w-sm mx-auto">
                                        1時間足エントリーの極意を伝承。<br/>
                                        上位足環境を味方につける術を攻略せよ。
                                    </p>
                                    <button 
                                        onClick={handleStart}
                                        className="group relative w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-6 rounded-2xl transition-all shadow-[0_10px_40px_rgba(168,85,247,0.3)] flex items-center justify-center gap-4 text-2xl overflow-hidden"
                                    >
                                        <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                                        訓練を開始する <ChevronRight className="group-hover:translate-x-2 transition-transform" />
                                    </button>
                                </div>
                            )}

                            {currentStep === 'quiz' && (
                                <div className="space-y-8">
                                    <div className="flex justify-between items-start border-b border-purple-500/20 pb-4">
                                        <div>
                                            <h2 className="text-purple-400 font-black text-sm uppercase tracking-[0.2em] mb-2 flex items-center gap-2">
                                                <Target size={16} /> 第 {currentQuestion + 1} 問 / {questions.length}
                                            </h2>
                                            <h3 className="text-2xl font-bold text-white tracking-tight">{questions[currentQuestion].title}</h3>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-4xl font-black text-purple-500 tracking-tighter">{score}</span>
                                            <span className="text-xs font-bold text-purple-700 block uppercase tracking-widest text-center">正解</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 mb-4">
                                        <div className="bg-purple-900/20 border border-purple-500/20 p-3 rounded-2xl flex items-center justify-between">
                                            <div className="flex items-center gap-2">
                                                <TrendingUp size={14} className="text-purple-400" />
                                                <span className="text-xs font-bold text-purple-400 tracking-widest">日足</span>
                                            </div>
                                            <span className="text-sm font-black text-white">{questions[currentQuestion].htf.d1}</span>
                                        </div>
                                        <div className="bg-purple-900/20 border border-purple-500/20 p-3 rounded-2xl flex items-center justify-between">
                                            <div className="flex items-center gap-2">
                                                <TrendingUp size={14} className="text-purple-400" />
                                                <span className="text-xs font-bold text-purple-400 tracking-widest">4時間足</span>
                                            </div>
                                            <span className="text-sm font-black text-white">{questions[currentQuestion].htf.h4}</span>
                                        </div>
                                    </div>
                                    
                                    <div className="rounded-2xl overflow-hidden border border-purple-500/20 shadow-inner">
                                        {questions[currentQuestion].svg}
                                    </div>

                                    <p className="text-xl text-purple-50 font-semibold leading-relaxed">
                                        {questions[currentQuestion].question}
                                    </p>

                                    <div className="grid grid-cols-1 gap-4">
                                        {questions[currentQuestion].options.map((option, idx) => (
                                            <button
                                                key={idx}
                                                disabled={showExplanation}
                                                onClick={() => handleAnswer(idx)}
                                                className={`w-full text-left p-6 rounded-2xl border-2 transition-all relative overflow-hidden ${
                                                    showExplanation 
                                                        ? idx === questions[currentQuestion].correct
                                                            ? 'border-green-500 bg-green-500/10 text-green-200 shadow-[0_0_20px_rgba(34,197,94,0.3)]'
                                                            : idx === selectedOption
                                                                ? 'border-red-500 bg-red-500/10 text-red-200'
                                                                : 'border-slate-800 text-slate-600 opacity-40'
                                                        : 'border-purple-500/20 bg-purple-900/10 hover:border-purple-400 hover:bg-purple-800/20 active:scale-[0.98]'
                                                }`}
                                            >
                                                <div className="flex items-center justify-between relative z-10">
                                                    <span className="text-lg font-medium pr-4">{option}</span>
                                                    {showExplanation && idx === questions[currentQuestion].correct && <CheckCircle className="text-green-400 flex-shrink-0" size={28} />}
                                                    {showExplanation && idx === selectedOption && idx !== questions[currentQuestion].correct && <XCircle className="text-red-400 flex-shrink-0" size={28} />}
                                                </div>
                                            </button>
                                        ))}
                                    </div>

                                    {showExplanation && (
                                        <div className="mt-10 p-8 bg-gradient-to-br from-purple-900/40 to-indigo-900/40 rounded-[2rem] border border-purple-500/30">
                                            <div className="flex items-start gap-5">
                                                <div className="p-3 bg-purple-500 rounded-2xl shadow-lg shadow-purple-500/40">
                                                    <AlertCircle className="text-white" size={24} />
                                                </div>
                                                <div>
                                                    <p className="text-sm font-black text-purple-300 uppercase tracking-[0.3em] mb-2">FX Shield 考察</p>
                                                    <p className="text-slate-200 text-lg leading-relaxed">{questions[currentQuestion].explanation}</p>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={nextQuestion}
                                                className="w-full mt-8 bg-white text-purple-900 font-black py-5 rounded-2xl hover:bg-purple-100 transition-all flex items-center justify-center gap-3 text-lg shadow-xl"
                                            >
                                                次の問題へ <ChevronRight size={20} />
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {currentStep === 'result' && (
                                <div className="text-center py-10">
                                    <div className="relative inline-block mb-10">
                                        <Trophy className="w-28 h-28 text-yellow-400 mx-auto animate-bounce" />
                                        <div className="absolute inset-0 bg-yellow-400/20 blur-3xl -z-10"></div>
                                    </div>
                                    <h2 className="text-4xl font-black mb-4 text-white">訓練完了</h2>
                                    <div className="text-8xl font-black text-purple-500 mb-8 drop-shadow-[0_0_20px_rgba(168,85,247,0.6)]">
                                        {Math.round((score / questions.length) * 100)}<span className="text-4xl ml-2">%</span>
                                    </div>
                                    <p className="text-purple-200/70 mb-12 text-xl leading-relaxed">
                                        全 {questions.length}問中 <span className="text-white font-black underline decoration-purple-500 underline-offset-8">{score}問</span> 正解しました。
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <button 
                                            onClick={handleStart}
                                            className="bg-purple-600 text-white font-black py-5 rounded-2xl flex items-center justify-center gap-3 hover:bg-purple-500 transition-all shadow-xl shadow-purple-900/40 text-lg"
                                        >
                                            <RefreshCcw size={22} /> もう一度挑戦
                                        </button>
                                        <button 
                                            onClick={() => window.location.reload()}
                                            className="bg-slate-800 text-slate-300 font-black py-5 rounded-2xl hover:bg-slate-700 transition-all text-lg"
                                        >
                                            終了する
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="mt-12 flex items-center gap-3 text-purple-500/40 text-sm font-black uppercase tracking-[0.4em]">
                        <Shield size={18} />
                        <span>FX Shield 中級環境認識ドリル</span>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
